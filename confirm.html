<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in — TransitionReady</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:       #1a7f6e;
      --teal-light: #e8f5f2;
      --teal-dark:  #0f5447;
      --ink:        #1a1f2e;
      --ink-soft:   #4a5368;
      --ink-faint:  #8a91a3;
      --error:      #c0392b;
      --error-bg:   #fdf0ee;
      --bg:         #f6f8fb;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--teal-dark);
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }

    .state { display: none; }
    .state.active { display: block; }

    /* Loading */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #e0e0e0;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9rem;
      color: var(--ink-soft);
      line-height: 1.7;
    }

    /* Success */
    .success-icon {
      width: 56px;
      height: 56px;
      background: var(--teal-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
    }

    /* Error */
    .error-icon {
      width: 56px;
      height: 56px;
      background: var(--error-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--teal-dark); }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">TransitionReady</div>

  <!-- Loading -->
  <div id="state-loading" class="state active">
    <div class="spinner"></div>
    <h2>Signing you in…</h2>
    <p>Just a moment while we verify your link.</p>
  </div>

  <!-- Success -->
  <div id="state-success" class="state">
    <div class="success-icon">✓</div>
    <h2>You're in!</h2>
    <p>Taking you to your portfolio now…</p>
  </div>

  <!-- Error -->
  <div id="state-error" class="state">
    <div class="error-icon">⚠️</div>
    <h2>Link expired</h2>
    <p id="error-message">This sign-in link has expired or already been used. Please request a new one.</p>
    <a href="/login.html" class="btn">Back to sign in</a>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://tmnswnvvmlnkblmqgzck.supabase.co';
  const SUPABASE_ANON = 'REPLACE_WITH_ANON_KEY';

  document.addEventListener('DOMContentLoaded', async () => {
    // Supabase magic link puts the session in the URL hash
    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type         = params.get('type'); // 'magiclink' or 'signup'
    const errorCode    = params.get('error');

    if (errorCode) {
      showError(params.get('error_description') || 'Your sign-in link is no longer valid.');
      return;
    }

    if (!accessToken) {
      showError('No sign-in token found. Please request a new link from the login page.');
      return;
    }

    try {
      // Exchange tokens to establish session
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON,
        },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });

      const session = await res.json();

      if (!res.ok || session.error) {
        showError('Your sign-in link has expired. Please request a new one.');
        return;
      }

      // Store session
      sessionStorage.setItem('tr_session', JSON.stringify(session));

      // Show success briefly then redirect
      showState('success');
      setTimeout(() => {
        window.location.href = '/app.html';
      }, 1200);

    } catch (err) {
      console.error('Confirm error:', err);
      showError('Something went wrong. Please try signing in again.');
    }
  });

  function showState(id) {
    document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
    document.getElementById(`state-${id}`).classList.add('active');
  }

  function showError(message) {
    document.getElementById('error-message').textContent = message;
    showState('error');
  }
</script>
</body>
</html>
